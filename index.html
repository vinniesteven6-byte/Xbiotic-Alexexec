<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AX-Executors — Private</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #9d4edd;
    --violet: #c77dff;
    --pink:   #ff6eb4;
    --cyan:   #00e5ff;
    --green:  #00f5a0;
    --dark:   #000000;
    --text:   #f0e6ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #bg { position: fixed; inset: 0; z-index: 0; }

  .scanlines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,.1) 3px, rgba(0,0,0,.1) 4px
    );
  }

  .vignette {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: radial-gradient(ellipse 85% 85% at 50% 50%,
      transparent 45%, rgba(0,0,0,.92) 100%);
  }

  .card-wrap {
    position: relative; z-index: 10;
    animation: cardIn 1s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(36px) scale(.95); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* spinning conic glow halo */
  .nebula-ring {
    position: absolute;
    inset: -70px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      transparent 0%,
      rgba(255,110,180,.3) 15%,
      rgba(0,229,255,.2) 30%,
      rgba(157,78,221,.35) 50%,
      rgba(100,30,255,.2) 65%,
      rgba(255,110,180,.15) 80%,
      transparent 100%
    );
    filter: blur(45px);
    animation: ringRotate 9s linear infinite;
    z-index: -1;
  }
  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .card {
    position: relative;
    width: 510px;
    padding: 50px 56px 44px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.1);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.04),
      0 0 90px rgba(157,78,221,.3),
      0 0 180px rgba(255,80,160,.1),
      inset 0 1px 0 rgba(255,255,255,.1);
  }

  #nebula-card {
    position: absolute; inset: 0; z-index: 0;
    border-radius: 12px;
  }

  .card-tint {
    position: absolute; inset: 0; z-index: 1;
    background: rgba(3,0,12,.7);
    border-radius: 12px;
  }

  .card-content { position: relative; z-index: 2; }

  /* corner brackets */
  .corner {
    position: absolute; width: 22px; height: 22px; z-index: 3; pointer-events:none;
  }
  .corner.tl { top:-1px; left:-1px;
    border-top: 2px solid var(--violet); border-left: 2px solid var(--violet);
    border-radius: 12px 0 0 0; }
  .corner.tr { top:-1px; right:-1px;
    border-top: 2px solid var(--pink); border-right: 2px solid var(--pink);
    border-radius: 0 12px 0 0; }
  .corner.bl { bottom:-1px; left:-1px;
    border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan);
    border-radius: 0 0 0 12px; }
  .corner.br { bottom:-1px; right:-1px;
    border-bottom: 2px solid var(--purple); border-right: 2px solid var(--purple);
    border-radius: 0 0 12px 0; }

  .url-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: .07em;
    color: rgba(200,160,255,.45);
    margin-bottom: 16px;
  }
  .url-tag .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 10px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100%{ opacity:1; box-shadow:0 0 10px var(--green); }
    50%{ opacity:.3; box-shadow:0 0 4px var(--green); }
  }

  .title-row { display:flex; align-items:baseline; gap:12px; margin-bottom:8px; }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px; letter-spacing: 4px; line-height: 1;
    background: linear-gradient(120deg,
      #fff 0%, #e8c8ff 20%, var(--pink) 45%, var(--cyan) 70%, #fff 100%);
    background-size: 250% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 22px rgba(200,120,255,.55));
    animation: titleShimmer 5s linear infinite;
  }
  @keyframes titleShimmer {
    from { background-position: 0% 0; }
    to   { background-position: 250% 0; }
  }

  .badge {
    padding: 3px 12px; border-radius: 3px;
    background: rgba(162,84,255,.1);
    border: 1px solid rgba(162,84,255,.4);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: .14em; color: var(--violet);
    animation: badgePulse 3.5s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%,100%{ box-shadow:0 0 14px rgba(162,84,255,.2); }
    50%    { box-shadow:0 0 30px rgba(162,84,255,.55), 0 0 60px rgba(255,110,180,.15); }
  }

  .subtitle {
    font-size: 12px; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase;
    color: rgba(200,160,255,.28);
  }

  .divider {
    width: 100%; height: 1px; margin: 26px 0; position: relative;
    background: linear-gradient(90deg,
      transparent, rgba(255,110,180,.5), rgba(0,229,255,.5),
      rgba(157,78,221,.55), transparent);
    background-size: 250% 100%;
    animation: divFlow 3.5s linear infinite;
  }
  @keyframes divFlow {
    from { background-position: 0 0; }
    to   { background-position: 250% 0; }
  }
  .divider::after {
    content:""; position:absolute;
    left:50%; top:50%; transform:translate(-50%,-50%);
    width:7px; height:7px; border-radius:50%;
    background: var(--violet);
    box-shadow: 0 0 16px var(--violet), 0 0 32px rgba(255,110,180,.4);
    animation: gemPop 2s ease-in-out infinite;
  }
  @keyframes gemPop {
    0%,100%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
    50%    { transform:translate(-50%,-50%) scale(1.6); opacity:.7; }
  }

  .stats { display:flex; flex-direction:column; gap:7px; }

  .stat-row {
    display:flex; align-items:center; justify-content:space-between;
    padding: 13px 18px; border-radius: 5px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.06);
    position: relative; overflow: hidden;
    transition: background .25s, border-color .25s, transform .2s;
    animation: rowIn .7s cubic-bezier(.22,1,.36,1) both;
  }
  .stat-row::after {
    content:""; position:absolute; inset:0;
    background: linear-gradient(90deg,
      transparent 0%, rgba(157,78,221,.09) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform .55s;
  }
  .stat-row:hover::after { transform: translateX(100%); }
  .stat-row:nth-child(1){ animation-delay:.1s; }
  .stat-row:nth-child(2){ animation-delay:.2s; }
  .stat-row:nth-child(3){ animation-delay:.3s; }
  .stat-row:nth-child(4){ animation-delay:.4s; }
  @keyframes rowIn {
    from{ opacity:0; transform:translateX(-18px); }
    to  { opacity:1; transform:translateX(0); }
  }
  .stat-row:hover {
    background: rgba(157,78,221,.08);
    border-color: rgba(157,78,221,.22);
    transform: translateX(5px);
  }

  .stat-label {
    display:flex; align-items:center; gap:10px;
    font-size: 13px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    color: rgba(210,180,255,.5);
  }
  .stat-label .pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--purple); box-shadow: 0 0 8px var(--purple); flex-shrink:0;
  }

  .stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px; font-weight: 700; letter-spacing: .05em;
  }
  .stat-val.pct {
    background: linear-gradient(90deg, var(--violet), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 9px rgba(200,120,255,.65));
  }
  .stat-val.platform {
    background: linear-gradient(90deg, var(--cyan), var(--violet), var(--cyan));
    background-size: 300% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 8px rgba(0,229,255,.45));
    animation: platformFlow 6s ease-in-out infinite;
  }
  @keyframes platformFlow {
    0%   { background-position: 0% 0; }
    50%  { background-position: 150% 0; }
    100% { background-position: 0% 0; }
  }
  .stat-val.ok {
    color: #3dff85;
    text-shadow: 0 0 18px rgba(61,255,133,.75), 0 0 42px rgba(61,255,133,.28);
    display:flex; align-items:center; gap:8px;
    font-weight: 700;
  }
  .stat-val.ok::before {
    content:"";
    width:8px; height:8px; border-radius:50%;
    background: #3dff85;
    box-shadow: 0 0 10px #3dff85, 0 0 24px rgba(61,255,133,.55);
    animation: blink 1.8s ease-in-out infinite;
  }

  .team-section { margin-top:24px; animation: rowIn .7s .42s cubic-bezier(.22,1,.36,1) both; }
  .team-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase;
    color: rgba(200,160,255,.28); margin-bottom: 12px;
  }
  .team-grid { display:flex; gap:8px; flex-wrap:wrap; }
  .member {
    padding: 6px 16px; border-radius: 4px;
    background: rgba(157,78,221,.07);
    border: 1px solid rgba(157,78,221,.2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px; letter-spacing: .06em; color: var(--text);
    cursor: default;
    transition: all .22s;
  }
  .member:hover {
    background: rgba(157,78,221,.18);
    border-color: rgba(255,110,180,.45);
    color: #fff;
    box-shadow: 0 0 18px rgba(255,110,180,.22), 0 0 8px rgba(157,78,221,.3);
  }

  .footer {
    margin-top: 28px;
    display:flex; flex-direction: column; align-items:center; gap: 10px;
    animation: rowIn .7s .52s cubic-bezier(.22,1,.36,1) both;
  }
  .footer-owners {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(120deg, #fff 0%, var(--violet) 40%, var(--pink) 75%, #fff 100%);
    background-size: 250% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 14px rgba(200,120,255,.55));
    animation: titleShimmer 5s linear infinite;
  }
  .footer-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
    color: rgba(200,160,255,.3);
  }
  .footer-meta {
    display:flex; align-items:center; gap:5px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: rgba(200,160,255,.22); letter-spacing: .08em;
  }
  .footer-meta::before {
    content:""; width:5px; height:5px; border-radius:50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: blink 2.5s ease-in-out infinite;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="card-wrap">
  <div class="nebula-ring"></div>
  <div class="card">
    <canvas id="nebula-card"></canvas>
    <div class="card-tint"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="card-content">
      <div class="url-tag"><span class="dot"></span>ax-executors.com/privated</div>

      <div class="title-row">

</div>


<script>
/* ════════════════════════════════════════════════════════════════════
   INTERSTELLAR-STYLE BLACK HOLE — Gargantua faithful reproduction
   Techniques used:
     · Far-side disk lensed OVER the top of the shadow (gravitational lensing arc)
     · Near-side disk blazing at the bottom with Doppler beaming
     · Multi-layer disk: white-hot inner → orange → amber → deep red outer
     · Photon ring thin bright band just outside the shadow
     · Bloom glow halos with chromatic layering
     · Infalling orbital dust on disk plane
     · Gravitationally lensed star field (stars warp around shadow)
     · Pure black deep-space background + faint nebula wisps
   ════════════════════════════════════════════════════════════════════ */
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
let W, H, BHX, BHY, R;

function resizeBg() {
  W = bgC.width  = window.innerWidth;
  H = bgC.height = window.innerHeight;
  BHX = W * .5;
  BHY = H * .5;
  R   = Math.min(W, H) * .19;
}
resizeBg();
window.addEventListener('resize', resizeBg);

/* ── STAR FIELD ── */
const STARS = Array.from({ length: 500 }, () => ({
  x:     Math.random(),
  y:     Math.random(),
  r:     Math.pow(Math.random(), 2.8) * 1.8 + .1,
  phase: Math.random() * Math.PI * 2,
  spd:   Math.random() * .5 + .15,
  b:     Math.random() * .9 + .1,
}));

/* ── DISK DUST PARTICLES (orbital) ── */
function mkDust() {
  const dist = Math.random() * .6 + .12;
  return {
    angle:  Math.random() * Math.PI * 2,
    dist,
    angSpd: (.002 + Math.random() * .006) * (Math.random() < .7 ? 1 : -1),
    radSpd: .00008 + Math.random() * .0002,
    r:      Math.random() * .8 + .15,
    b:      Math.random() * .6 + .3,
  };
}
const DUST = Array.from({ length: 300 }, mkDust);

let diskAngle = 0;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

/* ── DISK COLOR: white-hot → orange → amber → red ── */
function diskColor(radFraction, doppler) {
  /* radFraction: 0=inner edge, 1=outer edge */
  /* doppler: +1=near/blue, -1=far/red */
  const boost = 1 + .8 * Math.max(0, doppler);

  let r, g, b;
  if (radFraction < .18) {
    /* innermost: white-hot blue-white */
    r = 255; g = 245; b = 235;
  } else if (radFraction < .38) {
    /* hot: white → orange-yellow */
    const f = (radFraction - .18) / .20;
    r = 255;
    g = Math.floor(lerp(235, 180, f));
    b = Math.floor(lerp(200, 40, f));
  } else if (radFraction < .62) {
    /* warm: orange */
    const f = (radFraction - .38) / .24;
    r = 255;
    g = Math.floor(lerp(175, 110, f));
    b = Math.floor(lerp(35, 5, f));
  } else if (radFraction < .82) {
    /* cool: deep orange → red */
    const f = (radFraction - .62) / .20;
    r = Math.floor(lerp(250, 180, f));
    g = Math.floor(lerp(100, 35, f));
    b = 0;
  } else {
    /* outer: dim red */
    const f = (radFraction - .82) / .18;
    r = Math.floor(lerp(175, 80, f));
    g = Math.floor(lerp(28, 8, f));
    b = 0;
  }

  /* apply doppler shift: near-side boosted, far-side dimmed/reddened */
  if (doppler > 0) {
    /* blueshift: boost brightness slightly */
    r = clamp(Math.floor(r * boost), 0, 255);
    g = clamp(Math.floor(g * boost), 0, 255);
    b = clamp(Math.floor(b + doppler * 30), 0, 255);
  } else {
    /* redshift: dim greens/blues */
    g = clamp(Math.floor(g * (1 + doppler * .4)), 0, 255);
    b = clamp(Math.floor(b * (1 + doppler * .6)), 0, 255);
  }
  return [r, g, b];
}

const lerp = (a, b, t) => a + (b - a) * t;

/* ════════════ RENDER LOOP ════════════ */
function drawBH(ts) {
  const t = ts * .001;
  diskAngle += .003;

  bgX.clearRect(0, 0, W, H);

  /* ── 1. PURE BLACK COSMOS ── */
  bgX.fillStyle = '#000';
  bgX.fillRect(0, 0, W, H);

  /* ── 2. FAINT NEBULA WISPS (barely visible, deep space) ── */
  [
    { ox: -.6, oy: -.45, rb: 4.2, c: [40, 6, 80],  a: .10 },
    { ox:  .65, oy:  .35, rb: 3.5, c: [80, 12, 38], a: .07 },
    { ox: -.08, oy:  .60, rb: 3.0, c: [8, 40, 100], a: .06 },
  ].forEach((n, i) => {
    const cx = BHX + n.ox * R * 5.5 + Math.sin(t * .07 + i) * R * .18;
    const cy = BHY + n.oy * R * 5.5 + Math.cos(t * .05 + i) * R * .14;
    const gr = bgX.createRadialGradient(cx, cy, 0, cx, cy, R * n.rb);
    gr.addColorStop(0,  `rgba(${n.c[0]},${n.c[1]},${n.c[2]},${n.a})`);
    gr.addColorStop(.55,`rgba(${n.c[0]},${n.c[1]},${n.c[2]},${n.a * .2})`);
    gr.addColorStop(1,  'transparent');
    bgX.fillStyle = gr; bgX.fillRect(0, 0, W, H);
  });

  /* ── 3. GRAVITATIONALLY LENSED STAR FIELD ── */
  STARS.forEach(s => {
    const sx = s.x * W, sy = s.y * H;
    const dx = sx - BHX, dy = sy - BHY;
    const dist = Math.sqrt(dx*dx + dy*dy) || .001;
    /* deflect stars away from shadow */
    const lf = clamp(1 - dist / (R * 5), 0, 1);
    const px = sx + (dx / dist) * lf * R * .5;
    const py = sy + (dy / dist) * lf * R * .5;
    const dim = clamp((dist - R * .92) / (R * 2), 0, 1);
    const flicker = s.b * (.8 + .2 * Math.sin(t * s.spd + s.phase)) * dim;
    if (flicker < .012) return;
    bgX.beginPath();
    bgX.arc(px, py, s.r, 0, Math.PI * 2);
    bgX.fillStyle = `rgba(215,205,255,${flicker})`;
    bgX.fill();
  });

  /* ══════════════════════════════════════════════════════
     DISK RENDERING — 3 layers:
       A) FAR-SIDE BACK (behind shadow): drawn first, dimmer
       B) LENSING ARC over top: the far disk lensed over the BH
       C) NEAR-SIDE FRONT (in front of shadow): drawn last, brightest
     ══════════════════════════════════════════════════════ */

  const DISK_RINGS = [
    { rIn: R * 1.04, rOut: R * 1.22, baseA: .75 },
    { rIn: R * 1.20, rOut: R * 1.55, baseA: .52 },
    { rIn: R * 1.52, rOut: R * 2.05, baseA: .32 },
    { rIn: R * 2.02, rOut: R * 2.70, baseA: .16 },
    { rIn: R * 2.65, rOut: R * 3.40, baseA: .07 },
  ];

  /* ── A. FAR-SIDE disk (top half, behind BH shadow) ── */
  bgX.save();
  bgX.translate(BHX, BHY);
  bgX.scale(1, .28);
  /* clip to the FAR half (top = positive Y in flipped coords) */
  bgX.save();
  bgX.beginPath();
  bgX.rect(-R * 4, 0, R * 8, R * 4); /* bottom half in scaled coords = far side visually = top of screen */
  bgX.clip();
  DISK_RINGS.forEach(({ rIn, rOut, baseA }, ri) => {
    const steps = 320;
    for (let s = 0; s < steps; s++) {
      const a0 = (s / steps) * Math.PI * 2 + diskAngle;
      const a1 = ((s + 1) / steps) * Math.PI * 2 + diskAngle;
      const dp  = Math.sin(a0 - diskAngle) * -.7; /* far-side: dimmer */
      const rf  = ri / (DISK_RINGS.length - 1);
      const col = diskColor(rf, dp - .3);
      const boost = .35 + .25 * Math.max(0, -dp);
      bgX.beginPath();
      bgX.moveTo(Math.cos(a0) * rIn, Math.sin(a0) * rIn);
      bgX.arc(0, 0, rIn, a0, a1);
      bgX.arc(0, 0, rOut, a1, a0, true);
      bgX.closePath();
      bgX.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${baseA * boost})`;
      bgX.fill();
    }
  });
  bgX.restore(); /* remove far-side clip */
  bgX.restore();

  /* ── B. GRAVITATIONAL LENSING ARC over the top ──
     This is the signature Interstellar look: the far side of the
     accretion disk appears lensed as a bright curved arc ABOVE the shadow. */
  bgX.save();
  bgX.translate(BHX, BHY);

  /* Lensed arc: a squished ellipse passing over the top */
  const lensArcY = -R * 1.01; /* just above shadow */
  const lensW    = R * 2.2;
  const lensH    = R * .28;

  /* multi-layer glow of the lensed arc */
  [
    { ry: lensH * 2.8, a: .04, col: [255, 130, 30] },
    { ry: lensH * 1.8, a: .10, col: [255, 160, 50] },
    { ry: lensH * 1.2, a: .22, col: [255, 195, 80] },
    { ry: lensH * .85, a: .40, col: [255, 220, 130] },
    { ry: lensH * .55, a: .60, col: [255, 240, 180] },
    { ry: lensH * .30, a: .80, col: [255, 250, 230] },
  ].forEach(({ ry, a, col }) => {
    bgX.save();
    bgX.beginPath();
    /* clip to upper half only */
    bgX.rect(-lensW * 1.2, -R * 2, lensW * 2.4, R * 2);
    bgX.clip();
    bgX.beginPath();
    bgX.ellipse(0, lensArcY, lensW, ry, 0, 0, Math.PI * 2);
    bgX.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${a})`;
    bgX.lineWidth   = ry * 2;
    bgX.stroke();
    bgX.restore();
  });

  bgX.restore();

  /* ── SHADOW drawn here so near-side disk renders on top ── */
  /* outer shadow fade */
  const shG = bgX.createRadialGradient(BHX, BHY, R * .55, BHX, BHY, R * 1.08);
  shG.addColorStop(0,   '#000');
  shG.addColorStop(.70, '#000');
  shG.addColorStop(.88, 'rgba(0,0,0,.97)');
  shG.addColorStop(1,   'transparent');
  bgX.beginPath(); bgX.arc(BHX, BHY, R * 1.08, 0, Math.PI * 2);
  bgX.fillStyle = shG; bgX.fill();
  /* hard black disk */
  bgX.beginPath(); bgX.arc(BHX, BHY, R * .97, 0, Math.PI * 2);
  bgX.fillStyle = '#000'; bgX.fill();

  /* ── C. NEAR-SIDE disk (bottom half, in front of BH) — BRIGHTEST ── */
  bgX.save();
  bgX.translate(BHX, BHY);
  bgX.scale(1, .28);
  bgX.save();
  bgX.beginPath();
  bgX.rect(-R * 4, -R * 4, R * 8, R * 4); /* top half in scaled space = near side = bottom of screen */
  bgX.clip();
  DISK_RINGS.forEach(({ rIn, rOut, baseA }, ri) => {
    const steps = 380;
    for (let s = 0; s < steps; s++) {
      const a0 = (s / steps) * Math.PI * 2 + diskAngle;
      const a1 = ((s + 1) / steps) * Math.PI * 2 + diskAngle;
      const dp  = Math.sin(a0 - diskAngle);
      const rf  = ri / (DISK_RINGS.length - 1);
      const col = diskColor(rf, dp);
      /* near side: strong Doppler boost */
      const boost = .55 + .9 * Math.max(0, dp);
      bgX.beginPath();
      bgX.moveTo(Math.cos(a0) * rIn, Math.sin(a0) * rIn);
      bgX.arc(0, 0, rIn, a0, a1);
      bgX.arc(0, 0, rOut, a1, a0, true);
      bgX.closePath();
      bgX.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${baseA * boost})`;
      bgX.fill();
    }
  });
  bgX.restore();
  bgX.restore();

  /* ── D. NEAR-SIDE bright cap clip (wrap over shadow) ── */
  bgX.save();
  bgX.translate(BHX, BHY);
  bgX.beginPath();
  bgX.ellipse(0, 0, R * 2.15, R * 2.15 * .28, 0, Math.PI, Math.PI * 2);
  bgX.clip();
  const nearCap = bgX.createRadialGradient(0, 0, R, 0, 0, R * 2.2);
  nearCap.addColorStop(0,   'rgba(255,240,180,.72)');
  nearCap.addColorStop(.28, 'rgba(255,180,60,.42)');
  nearCap.addColorStop(.60, 'rgba(220,90,20,.16)');
  nearCap.addColorStop(1,   'transparent');
  bgX.fillStyle = nearCap;
  bgX.fillRect(-R * 3, -R * 3, R * 6, R * 6);
  bgX.restore();

  /* ── 6. PHOTON RING — thin bright halo just outside shadow ── */
  /* chromatic layers */
  [
    { dr:  0, w:  3.5, col: 'rgba(255,240,180,.90)' },
    { dr:  4, w:  7,   col: 'rgba(255,200,100,.38)' },
    { dr: 10, w: 14,   col: 'rgba(255,150,50,.16)'  },
    { dr: 22, w: 28,   col: 'rgba(200,80,10,.07)'   },
    { dr: 45, w: 55,   col: 'rgba(140,40,0,.03)'    },
  ].forEach(({ dr, w, col }) => {
    bgX.beginPath();
    bgX.arc(BHX, BHY, R * 1.0 + dr, 0, Math.PI * 2);
    bgX.strokeStyle = col;
    bgX.lineWidth   = w;
    bgX.stroke();
  });

  /* pulsing photon glow */
  const pp = .88 + .12 * Math.sin(t * 3.1);
  const prG = bgX.createRadialGradient(BHX, BHY, R * .98, BHX, BHY, R * 1.08);
  prG.addColorStop(0, `rgba(255,235,160,${.65 * pp})`);
  prG.addColorStop(1, 'transparent');
  bgX.beginPath(); bgX.arc(BHX, BHY, R * 1.1, 0, Math.PI * 2);
  bgX.fillStyle = prG; bgX.fill();

  /* ── 7. REDRAW BLACK DISK to keep shadow clean ── */
  bgX.beginPath(); bgX.arc(BHX, BHY, R * .967, 0, Math.PI * 2);
  bgX.fillStyle = '#000'; bgX.fill();

  /* ── 8. HEAT SHIMMER at horizon edge ── */
  const sh = .5 + .5 * Math.sin(t * 5.2);
  const hG = bgX.createRadialGradient(BHX, BHY, R * .95, BHX, BHY, R * 1.03);
  hG.addColorStop(0, `rgba(255,210,100,${sh * .28})`);
  hG.addColorStop(1, 'transparent');
  bgX.beginPath(); bgX.arc(BHX, BHY, R * 1.04, 0, Math.PI * 2);
  bgX.fillStyle = hG; bgX.fill();

  /* ── 9. INFALLING DUST (disk plane, elliptical) ── */
  bgX.save();
  bgX.translate(BHX, BHY);
  bgX.scale(1, .28);
  DUST.forEach(d => {
    d.angle += d.angSpd * (1 + .5 / (d.dist + .1));
    d.dist  -= d.radSpd;
    if (d.dist < .04) { Object.assign(d, mkDust()); return; }
    const px = Math.cos(d.angle) * d.dist * R * 2.7;
    const py = Math.sin(d.angle) * d.dist * R * 2.7;
    const al = d.b * clamp(d.dist * 2.8, 0, 1) * .55;
    const dp = Math.sin(d.angle - diskAngle);
    const rc = dp > 0 ? 240 : 255;
    const gc = dp > 0 ? 190 : Math.floor(130 + dp * 80);
    bgX.beginPath(); bgX.arc(px, py, d.r, 0, Math.PI * 2);
    bgX.fillStyle = `rgba(${rc},${gc},80,${al})`; bgX.fill();
  });
  bgX.restore();

  /* ── 10. OUTER ATMOSPHERIC BLOOM ── */
  const bloomG = bgX.createRadialGradient(BHX, BHY + R * .04, R * 1.08, BHX, BHY, R * 2.0);
  bloomG.addColorStop(0,   'rgba(255,170,40,.16)');
  bloomG.addColorStop(.40, 'rgba(200,80,15,.06)');
  bloomG.addColorStop(.75, 'rgba(120,30,5,.02)');
  bloomG.addColorStop(1,   'transparent');
  bgX.beginPath(); bgX.arc(BHX, BHY, R * 2.0, 0, Math.PI * 2);
  bgX.fillStyle = bloomG; bgX.fill();

  requestAnimationFrame(drawBH);
}
requestAnimationFrame(drawBH);

/* ════════════ CARD NEBULA ════════════ */
const nc    = document.getElementById('nebula-card');
const nX    = nc.getContext('2d');
const cardEl = nc.closest('.card');
function resizeNc() { nc.width = cardEl.offsetWidth; nc.height = cardEl.offsetHeight; }
resizeNc();

const NODES = [
  { x:.12, y:.18, vx:.00040, vy:.00025, col:[170,60,255],  sz:.95 },
  { x:.80, y:.12, vx:-.00030,vy:.00033, col:[255,75,175],  sz:.90 },
  { x:.52, y:.52, vx:.00022, vy:-.00028,col:[30,215,255],  sz:.85 },
  { x:.18, y:.80, vx:.00035, vy:-.00020,col:[210,45,255],  sz:.80 },
  { x:.82, y:.72, vx:-.00027,vy:.00022, col:[255,115,70],  sz:.75 },
  { x:.42, y:.90, vx:.00018, vy:.00030, col:[70,90,255],   sz:.72 },
  { x:.65, y:.35, vx:-.00022,vy:-.00025,col:[255,200,80],  sz:.65 },
];
const SPARKS = Array.from({ length: 60 }, () => ({
  x: Math.random(), y: Math.random(),
  phase: Math.random() * Math.PI * 2,
  spd:   Math.random() * .35 + .1,
  r:     Math.random() * .8 + .3,
}));

function drawNebula(ts) {
  const W = nc.width, H = nc.height, t = ts * .001;
  nX.clearRect(0, 0, W, H);
  NODES.forEach(n => {
    n.x += n.vx + Math.sin(t * .65 + n.col[0] * .007) * .00035;
    n.y += n.vy + Math.cos(t * .55 + n.col[1] * .007) * .00035;
    if (n.x < 0 || n.x > 1) n.vx *= -1;
    if (n.y < 0 || n.y > 1) n.vy *= -1;
    const cx = n.x * W, cy = n.y * H;
    const rad = Math.min(W, H) * n.sz * .82;
    const a   = .14 + .06 * Math.sin(t * 1.1 + n.col[0] * .005);
    const g = nX.createRadialGradient(cx, cy, 0, cx, cy, rad);
    g.addColorStop(0,   `rgba(${n.col[0]},${n.col[1]},${n.col[2]},${a})`);
    g.addColorStop(.45, `rgba(${n.col[0]},${n.col[1]},${n.col[2]},${a * .35})`);
    g.addColorStop(1,   'transparent');
    nX.fillStyle = g; nX.fillRect(0, 0, W, H);
  });
  [.22, .52, .80].forEach((yp, i) => {
    const cy = (yp + Math.sin(t * .38 + i * 2.2) * .04) * H;
    const colors = ['rgba(157,78,221,.06)', 'rgba(255,110,180,.05)', 'rgba(0,210,255,.045)'];
    const gb = nX.createLinearGradient(0, cy - 70, 0, cy + 70);
    gb.addColorStop(0, 'transparent'); gb.addColorStop(.5, colors[i]); gb.addColorStop(1, 'transparent');
    nX.fillStyle = gb; nX.fillRect(0, cy - 70, W, 140);
  });
  SPARKS.forEach(s => {
    const a = (.38 + .32 * Math.sin(t * s.spd + s.phase)) * .55;
    nX.beginPath(); nX.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    nX.fillStyle = `rgba(225,195,255,${a})`; nX.fill();
  });
  requestAnimationFrame(drawNebula);
}
requestAnimationFrame(drawNebula);
