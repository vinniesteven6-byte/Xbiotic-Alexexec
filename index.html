<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AX-Executors — Private</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #9d4edd;
    --violet: #c77dff;
    --pink:   #ff6eb4;
    --cyan:   #00e5ff;
    --green:  #00f5a0;
    --dark:   #000000;
    --text:   #f0e6ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #bg { position: fixed; inset: 0; z-index: 0; }

  .scanlines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,.1) 3px, rgba(0,0,0,.1) 4px
    );
  }

  .vignette {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: radial-gradient(ellipse 85% 85% at 50% 50%,
      transparent 45%, rgba(0,0,0,.92) 100%);
  }

  .card-wrap {
    position: relative; z-index: 10;
    animation: cardIn 1s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(36px) scale(.95); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* spinning conic glow halo */
  .nebula-ring {
    position: absolute;
    inset: -70px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      transparent 0%,
      rgba(255,110,180,.3) 15%,
      rgba(0,229,255,.2) 30%,
      rgba(157,78,221,.35) 50%,
      rgba(100,30,255,.2) 65%,
      rgba(255,110,180,.15) 80%,
      transparent 100%
    );
    filter: blur(45px);
    animation: ringRotate 9s linear infinite;
    z-index: -1;
  }
  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .card {
    position: relative;
    width: 510px;
    padding: 50px 56px 44px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.1);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.04),
      0 0 90px rgba(157,78,221,.3),
      0 0 180px rgba(255,80,160,.1),
      inset 0 1px 0 rgba(255,255,255,.1);
  }

  #nebula-card {
    position: absolute; inset: 0; z-index: 0;
    border-radius: 12px;
  }

  .card-tint {
    position: absolute; inset: 0; z-index: 1;
    background: rgba(3,0,12,.7);
    border-radius: 12px;
  }

  .card-content { position: relative; z-index: 2; }

  /* corner brackets */
  .corner {
    position: absolute; width: 22px; height: 22px; z-index: 3; pointer-events:none;
  }
  .corner.tl { top:-1px; left:-1px;
    border-top: 2px solid var(--violet); border-left: 2px solid var(--violet);
    border-radius: 12px 0 0 0; }
  .corner.tr { top:-1px; right:-1px;
    border-top: 2px solid var(--pink); border-right: 2px solid var(--pink);
    border-radius: 0 12px 0 0; }
  .corner.bl { bottom:-1px; left:-1px;
    border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan);
    border-radius: 0 0 0 12px; }
  .corner.br { bottom:-1px; right:-1px;
    border-bottom: 2px solid var(--purple); border-right: 2px solid var(--purple);
    border-radius: 0 0 12px 0; }

  .url-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: .07em;
    color: rgba(200,160,255,.45);
    margin-bottom: 16px;
  }
  .url-tag .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 10px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100%{ opacity:1; box-shadow:0 0 10px var(--green); }
    50%{ opacity:.3; box-shadow:0 0 4px var(--green); }
  }

  .title-row { display:flex; align-items:baseline; gap:12px; margin-bottom:8px; }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px; letter-spacing: 4px; line-height: 1;
    background: linear-gradient(120deg,
      #fff 0%, #e8c8ff 20%, var(--pink) 45%, var(--cyan) 70%, #fff 100%);
    background-size: 250% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 22px rgba(200,120,255,.55));
    animation: titleShimmer 5s linear infinite;
  }
  @keyframes titleShimmer {
    from { background-position: 0% 0; }
    to   { background-position: 250% 0; }
  }

  .badge {
    padding: 3px 12px; border-radius: 3px;
    background: rgba(162,84,255,.1);
    border: 1px solid rgba(162,84,255,.4);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: .14em; color: var(--violet);
    animation: badgePulse 3.5s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%,100%{ box-shadow:0 0 14px rgba(162,84,255,.2); }
    50%    { box-shadow:0 0 30px rgba(162,84,255,.55), 0 0 60px rgba(255,110,180,.15); }
  }

  .subtitle {
    font-size: 12px; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase;
    color: rgba(200,160,255,.28);
  }

  .divider {
    width: 100%; height: 1px; margin: 26px 0; position: relative;
    background: linear-gradient(90deg,
      transparent, rgba(255,110,180,.5), rgba(0,229,255,.5),
      rgba(157,78,221,.55), transparent);
    background-size: 250% 100%;
    animation: divFlow 3.5s linear infinite;
  }
  @keyframes divFlow {
    from { background-position: 0 0; }
    to   { background-position: 250% 0; }
  }
  .divider::after {
    content:""; position:absolute;
    left:50%; top:50%; transform:translate(-50%,-50%);
    width:7px; height:7px; border-radius:50%;
    background: var(--violet);
    box-shadow: 0 0 16px var(--violet), 0 0 32px rgba(255,110,180,.4);
    animation: gemPop 2s ease-in-out infinite;
  }
  @keyframes gemPop {
    0%,100%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
    50%    { transform:translate(-50%,-50%) scale(1.6); opacity:.7; }
  }

  .stats { display:flex; flex-direction:column; gap:7px; }

  .stat-row {
    display:flex; align-items:center; justify-content:space-between;
    padding: 13px 18px; border-radius: 5px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.06);
    position: relative; overflow: hidden;
    transition: background .25s, border-color .25s, transform .2s;
    animation: rowIn .7s cubic-bezier(.22,1,.36,1) both;
  }
  .stat-row::after {
    content:""; position:absolute; inset:0;
    background: linear-gradient(90deg,
      transparent 0%, rgba(157,78,221,.09) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform .55s;
  }
  .stat-row:hover::after { transform: translateX(100%); }
  .stat-row:nth-child(1){ animation-delay:.1s; }
  .stat-row:nth-child(2){ animation-delay:.2s; }
  .stat-row:nth-child(3){ animation-delay:.3s; }
  .stat-row:nth-child(4){ animation-delay:.4s; }
  @keyframes rowIn {
    from{ opacity:0; transform:translateX(-18px); }
    to  { opacity:1; transform:translateX(0); }
  }
  .stat-row:hover {
    background: rgba(157,78,221,.08);
    border-color: rgba(157,78,221,.22);
    transform: translateX(5px);
  }

  .stat-label {
    display:flex; align-items:center; gap:10px;
    font-size: 13px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    color: rgba(210,180,255,.5);
  }
  .stat-label .pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--purple); box-shadow: 0 0 8px var(--purple); flex-shrink:0;
  }

  .stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px; font-weight: 700; letter-spacing: .05em;
  }
  .stat-val.pct {
    background: linear-gradient(90deg, var(--violet), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 9px rgba(200,120,255,.65));
  }
  .stat-val.platform {
    background: linear-gradient(90deg, var(--cyan), var(--violet), var(--cyan));
    background-size: 300% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 8px rgba(0,229,255,.45));
    animation: platformFlow 6s ease-in-out infinite;
  }
  @keyframes platformFlow {
    0%   { background-position: 0% 0; }
    50%  { background-position: 150% 0; }
    100% { background-position: 0% 0; }
  }
  .stat-val.ok {
    color: #3dff85;
    text-shadow: 0 0 18px rgba(61,255,133,.75), 0 0 42px rgba(61,255,133,.28);
    display:flex; align-items:center; gap:8px;
    font-weight: 700;
  }
  .stat-val.ok::before {
    content:"";
    width:8px; height:8px; border-radius:50%;
    background: #3dff85;
    box-shadow: 0 0 10px #3dff85, 0 0 24px rgba(61,255,133,.55);
    animation: blink 1.8s ease-in-out infinite;
  }

  .team-section { margin-top:24px; animation: rowIn .7s .42s cubic-bezier(.22,1,.36,1) both; }
  .team-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase;
    color: rgba(200,160,255,.28); margin-bottom: 12px;
  }
  .team-grid { display:flex; gap:8px; flex-wrap:wrap; }
  .member {
    padding: 6px 16px; border-radius: 4px;
    background: rgba(157,78,221,.07);
    border: 1px solid rgba(157,78,221,.2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px; letter-spacing: .06em; color: var(--text);
    cursor: default;
    transition: all .22s;
  }
  .member:hover {
    background: rgba(157,78,221,.18);
    border-color: rgba(255,110,180,.45);
    color: #fff;
    box-shadow: 0 0 18px rgba(255,110,180,.22), 0 0 8px rgba(157,78,221,.3);
  }

  .footer {
    margin-top: 28px;
    display:flex; flex-direction: column; align-items:center; gap: 10px;
    animation: rowIn .7s .52s cubic-bezier(.22,1,.36,1) both;
  }
  .footer-owners {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(120deg, #fff 0%, var(--violet) 40%, var(--pink) 75%, #fff 100%);
    background-size: 250% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 14px rgba(200,120,255,.55));
    animation: titleShimmer 5s linear infinite;
  }
  .footer-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
    color: rgba(200,160,255,.3);
  }
  .footer-meta {
    display:flex; align-items:center; gap:5px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: rgba(200,160,255,.22); letter-spacing: .08em;
  }
  .footer-meta::before {
    content:""; width:5px; height:5px; border-radius:50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: blink 2.5s ease-in-out infinite;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="card-wrap">
  <div class="nebula-ring"></div>
  <div class="card">
    <canvas id="nebula-card"></canvas>
    <div class="card-tint"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="card-content">
      <div class="url-tag"><span class="dot"></span>ax-executors.com/privated</div>

      <div class="title-row">
        <div class="title">AX‑Executors</div>
        <div class="badge">PRIVATE</div>
      </div>
      <div class="subtitle">Elite Execution Suite</div>

      <div class="divider"></div>

      <div class="stats">
        <div class="stat-row">
          <div class="stat-label"><span class="pip"></span>UNC Support</div>
          <div class="stat-val pct">100%</div>
        </div>
        <div class="stat-row">
          <div class="stat-label"><span class="pip"></span>SUNC Support</div>
          <div class="stat-val pct">100%</div>
        </div>
        <div class="stat-row">
          <div class="stat-label"><span class="pip"></span>Status</div>
          <div class="stat-val ok">Working &amp; Undetected</div>
        </div>
        <div class="stat-row">
          <div class="stat-label"><span class="pip"></span>Platform</div>
          <div class="stat-val platform">Mobile &amp; PC</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="team-section">
        <div class="team-label">Access List</div>

          <div class="member">Xbiotic</div>

          <div class="member">Heat</div>

          <div class="member">Moon</div>
        </div>
      </div>

      <div class="footer">
        <div class="footer-label">Crafted by</div>
        <div class="footer-owners">Xbiotic &amp; Alex</div>
        <div class="footer-meta">Build 2.4.1</div>
      </div>
    </div>
  </div>
</div>


<script>
/* ═══════════════════════════════════════════════════════════════
   CINEMATIC BLACK HOLE — Clean & Ultra Detailed
   One coherent structure, no ghost rings.
   ═══════════════════════════════════════════════════════════════ */
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
let W, H, CX, CY, R;

function resizeBg(){
  W  = bgC.width  = window.innerWidth;
  H  = bgC.height = window.innerHeight;
  CX = W * 0.5;
  CY = H * 0.5;
  R  = Math.min(W,H) * 0.20;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const lerp  = (a,b,t)   => a+(b-a)*t;
const PI2   = Math.PI*2;

/* ── STARS ── */
const STARS = Array.from({length:700},()=>({
  x: Math.random(), y: Math.random(),
  r: Math.pow(Math.random(),2.5)*2.1+0.12,
  ph: Math.random()*PI2, sp: Math.random()*0.6+0.1,
  b: Math.random()*0.9+0.1,
  rgb: Math.random()<0.6?'215,210,255':Math.random()<0.5?'200,228,255':'255,228,200',
}));

/* ── DUST ── */
function mkDust(){
  const d=Math.random()*0.55+0.15;
  return{ ang:Math.random()*PI2, dist:d,
    spd:(0.0015+Math.random()*0.006)*(Math.random()<0.7?1:-1),
    fall:0.00005+Math.random()*0.00015, r:Math.random()*0.8+0.2, b:Math.random()*0.7+0.3 };
}
const DUST = Array.from({length:320},mkDust);

/* ── DISK COLOUR ── */
function dcol(rf,dp){
  // rf 0=inner 1=outer, dp -1=redshift +1=blueshift
  let r,g,b;
  if      (rf<0.10){r=255;g=253;b=252;}
  else if (rf<0.25){const f=(rf-0.10)/0.15;r=255;g=Math.floor(lerp(250,218,f));b=Math.floor(lerp(245,110,f));}
  else if (rf<0.45){const f=(rf-0.25)/0.20;r=255;g=Math.floor(lerp(215,148,f));b=Math.floor(lerp(105,12,f));}
  else if (rf<0.65){const f=(rf-0.45)/0.20;r=255;g=Math.floor(lerp(142,82,f));b=4;}
  else if (rf<0.82){const f=(rf-0.65)/0.17;r=Math.floor(lerp(255,175,f));g=Math.floor(lerp(78,28,f));b=0;}
  else             {const f=(rf-0.82)/0.18;r=Math.floor(lerp(172,68,f));g=Math.floor(lerp(22,6,f));b=0;}
  const boost=1+0.95*Math.max(0,dp);
  const dim  =1+0.50*Math.min(0,dp);
  return[clamp(Math.round(r*boost*dim),0,255),
         clamp(Math.round(g*boost*dim-dp*8),0,255),
         clamp(Math.round(b*boost*dim),0,255)];
}

const DISK_TILT = 0.27; // vertical squish = disk inclination
const RINGS = [
  {ri:1.03,ro:1.22,a:0.82},
  {ri:1.20,ro:1.56,a:0.56},
  {ri:1.54,ro:2.10,a:0.32},
  {ri:2.08,ro:2.82,a:0.14},
  {ri:2.80,ro:3.65,a:0.055},
];
const STEPS = 600; // high step count = smooth, no polygon edges

let rot=0;

function frame(ts){
  const t=ts*0.001;
  rot+=0.0026;

  bgX.clearRect(0,0,W,H);

  /* ── BLACK VOID ── */
  bgX.fillStyle='#000';
  bgX.fillRect(0,0,W,H);

  /* ── SUBTLE NEBULA ── */
  [{ox:-0.65,oy:-0.48,nr:5.0,c:[32,4,72],a:0.10},
   {ox: 0.68,oy: 0.38,nr:4.4,c:[72,9,30],a:0.07},
   {ox:-0.08,oy: 0.65,nr:3.8,c:[5,32,90],a:0.06},
   {ox: 0.28,oy:-0.58,nr:3.5,c:[60,7,80],a:0.05}
  ].forEach((n,i)=>{
    const cx=CX+n.ox*R*5.5+Math.sin(t*0.06+i)*R*0.12;
    const cy=CY+n.oy*R*5.5+Math.cos(t*0.05+i)*R*0.10;
    const g=bgX.createRadialGradient(cx,cy,0,cx,cy,R*n.nr);
    g.addColorStop(0,`rgba(${n.c[0]},${n.c[1]},${n.c[2]},${n.a})`);
    g.addColorStop(0.5,`rgba(${n.c[0]},${n.c[1]},${n.c[2]},${n.a*0.18})`);
    g.addColorStop(1,'transparent');
    bgX.fillStyle=g; bgX.fillRect(0,0,W,H);
  });

  /* ── STARS with lensing deflection ── */
  STARS.forEach(s=>{
    const sx=s.x*W, sy=s.y*H;
    const dx=sx-CX, dy=sy-CY, d=Math.sqrt(dx*dx+dy*dy)||0.001;
    const lf=clamp(1-d/(R*6),0,1);
    const px=sx+(dx/d)*lf*R*0.6, py=sy+(dy/d)*lf*R*0.6;
    const dim=clamp((d-R*0.9)/(R*2.5),0,1);
    const fl=s.b*(0.76+0.24*Math.sin(t*s.sp+s.ph))*dim;
    if(fl<0.01)return;
    // diffraction cross on bright stars
    if(s.r>1.5&&fl>0.5){
      bgX.save();
      bgX.strokeStyle=`rgba(${s.rgb},${fl*0.25})`; bgX.lineWidth=0.55;
      const cl=s.r*4;
      bgX.beginPath();bgX.moveTo(px-cl,py);bgX.lineTo(px+cl,py);bgX.stroke();
      bgX.beginPath();bgX.moveTo(px,py-cl);bgX.lineTo(px,py+cl);bgX.stroke();
      bgX.restore();
    }
    bgX.beginPath(); bgX.arc(px,py,s.r,0,PI2);
    bgX.fillStyle=`rgba(${s.rgb},${fl})`; bgX.fill();
  });

  /* ── LARGE OUTER DISK HEAT GLOW ── */
  bgX.save(); bgX.translate(CX,CY); bgX.scale(1,DISK_TILT);
  const hg=bgX.createRadialGradient(0,0,R*0.85,0,0,R*4.8);
  hg.addColorStop(0,'rgba(255,128,20,0)');
  hg.addColorStop(0.10,'rgba(255,115,15,0.28)');
  hg.addColorStop(0.35,'rgba(210,62,8,0.12)');
  hg.addColorStop(0.65,'rgba(140,28,4,0.04)');
  hg.addColorStop(1,'transparent');
  bgX.fillStyle=hg; bgX.fillRect(-R*5.5,-R*5.5,R*11,R*11);
  bgX.restore();

  /* ══ DISK PASS A — full disk behind everything ══
     Drawn with scale so far side = top, near side = bottom.
     We draw ALL segments then let the shadow cover the middle. */
  bgX.save(); bgX.translate(CX,CY); bgX.scale(1,DISK_TILT);
  RINGS.forEach(({ri,ro,a},ri_)=>{
    ri=ri*R; ro=ro*R;
    for(let s=0;s<STEPS;s++){
      const a0=(s/STEPS)*PI2+rot;
      const a1=((s+1)/STEPS)*PI2+rot;
      // doppler: sin of angle relative to viewer (0=sideways, ±1=toward/away)
      const dp=Math.sin(a0-rot);
      const rf=ri_/(RINGS.length-1);
      const[cr,cg,cb]=dcol(rf,dp);
      // near side (negative y in scaled space = bottom of screen) brighter
      const nearBoost = clamp(0.3+0.9*Math.max(0,dp), 0.28, 1.62);
      bgX.beginPath();
      bgX.arc(0,0,ri,a0,a1);
      bgX.arc(0,0,ro,a1,a0,true);
      bgX.closePath();
      bgX.fillStyle=`rgba(${cr},${cg},${cb},${a*nearBoost})`;
      bgX.fill();
    }
  });
  bgX.restore();

  /* ══ SHADOW — wipe the centre clean ══ */
  // Soft outer fade first
  const sf=bgX.createRadialGradient(CX,CY,R*0.52,CX,CY,R*1.18);
  sf.addColorStop(0,'rgba(0,0,0,1)');
  sf.addColorStop(0.70,'rgba(0,0,0,1)');
  sf.addColorStop(0.88,'rgba(0,0,0,0.97)');
  sf.addColorStop(1,'rgba(0,0,0,0)');
  bgX.beginPath(); bgX.arc(CX,CY,R*1.18,0,PI2);
  bgX.fillStyle=sf; bgX.fill();
  // Hard black disk
  bgX.beginPath(); bgX.arc(CX,CY,R*0.975,0,PI2);
  bgX.fillStyle='#000'; bgX.fill();

  /* ══ DISK PASS B — near-side only, drawn OVER the shadow ══
     Clip to the BOTTOM half (near side) so only the bright
     near-side bottom arc appears in front of the shadow. */
  bgX.save(); bgX.translate(CX,CY); bgX.scale(1,DISK_TILT);
  bgX.save();
  bgX.beginPath();
  // In scaled space, near side is negative Y (top of canvas = bottom visually)
  bgX.rect(-R*4.5,-R*4.5,R*9,R*4.5);
  bgX.clip();
  RINGS.forEach(({ri,ro,a},ri_)=>{
    ri=ri*R; ro=ro*R;
    for(let s=0;s<STEPS;s++){
      const a0=(s/STEPS)*PI2+rot;
      const a1=((s+1)/STEPS)*PI2+rot;
      const dp=Math.sin(a0-rot);
      const rf=ri_/(RINGS.length-1);
      const[cr,cg,cb]=dcol(rf,dp);
      const boost=clamp(0.5+1.15*Math.max(0,dp),0.5,1.8);
      bgX.beginPath();
      bgX.arc(0,0,ri,a0,a1);
      bgX.arc(0,0,ro,a1,a0,true);
      bgX.closePath();
      bgX.fillStyle=`rgba(${cr},${cg},${cb},${a*boost})`;
      bgX.fill();
    }
  });
  bgX.restore();
  bgX.restore();

  /* ══ PHOTON RING — the thin bright ring just outside the shadow ══
     Draw ONLY on the bottom arc (near side) full circle for the glow,
     but the near-side is visibly brighter. */
  const pR=R*1.005;
  // Full glowing ring layers (they surround the whole shadow which is correct)
  [{d:0,   w:2.0, c:'rgba(255,252,218,0.95)'},
   {d:3,   w:5.5, c:'rgba(255,228,148,0.50)'},
   {d:8,   w:13,  c:'rgba(255,190,78,0.22)'},
   {d:18,  w:26,  c:'rgba(255,142,38,0.10)'},
   {d:36,  w:50,  c:'rgba(218,80,10,0.050)'},
   {d:70,  w:90,  c:'rgba(162,38,0,0.024)'},
   {d:125, w:155, c:'rgba(95,12,0,0.010)'},
  ].forEach(({d,w,c})=>{
    bgX.beginPath(); bgX.arc(CX,CY,pR+d,0,PI2);
    bgX.strokeStyle=c; bgX.lineWidth=w; bgX.stroke();
  });

  /* Animated pulse on photon ring */
  const pp=0.86+0.14*Math.sin(t*3.2);
  const pg=bgX.createRadialGradient(CX,CY,R*0.97,CX,CY,R*1.09);
  pg.addColorStop(0,`rgba(255,240,172,${0.68*pp})`);
  pg.addColorStop(1,'transparent');
  bgX.beginPath(); bgX.arc(CX,CY,R*1.10,0,PI2);
  bgX.fillStyle=pg; bgX.fill();

  /* ══ EVENT HORIZON — final clean black circle ══ */
  bgX.beginPath(); bgX.arc(CX,CY,R*0.966,0,PI2);
  bgX.fillStyle='#000'; bgX.fill();

  /* Subtle hot shimmer at boundary */
  const hs=0.4+0.4*Math.sin(t*6.1);
  const hsg=bgX.createRadialGradient(CX,CY,R*0.92,CX,CY,R*1.005);
  hsg.addColorStop(0,`rgba(255,210,105,${hs*0.20})`);
  hsg.addColorStop(1,'transparent');
  bgX.beginPath(); bgX.arc(CX,CY,R*1.005,0,PI2);
  bgX.fillStyle=hsg; bgX.fill();

  /* ══ INFALLING DUST on disk plane ══ */
  bgX.save(); bgX.translate(CX,CY); bgX.scale(1,DISK_TILT);
  DUST.forEach(d=>{
    d.ang+=d.spd*(1+0.5/(d.dist+0.08));
    d.dist-=d.fall;
    if(d.dist<0.04){Object.assign(d,mkDust());return;}
    const px=Math.cos(d.ang)*d.dist*R*2.9;
    const py=Math.sin(d.ang)*d.dist*R*2.9;
    const al=d.b*clamp(d.dist*2.5,0,1)*0.50;
    const dp=Math.sin(d.ang-rot);
    const rc=dp>0?232:255, gc=dp>0?185:Math.floor(122+dp*78);
    bgX.beginPath(); bgX.arc(px,py,d.r,0,PI2);
    bgX.fillStyle=`rgba(${rc},${gc},72,${al})`; bgX.fill();
  });
  bgX.restore();

  /* ══ FINAL ATMOSPHERIC BLOOM ══ */
  const blm=bgX.createRadialGradient(CX,CY+R*0.04,R*1.08,CX,CY,R*2.4);
  blm.addColorStop(0,'rgba(255,162,32,0.20)');
  blm.addColorStop(0.36,'rgba(200,72,10,0.07)');
  blm.addColorStop(0.70,'rgba(118,24,3,0.025)');
  blm.addColorStop(1,'transparent');
  bgX.beginPath(); bgX.arc(CX,CY,R*2.4,0,PI2);
  bgX.fillStyle=blm; bgX.fill();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ════════════ CARD NEBULA ════════════ */
const nc    = document.getElementById('nebula-card');
const nX    = nc.getContext('2d');
const cardEl = nc.closest('.card');
function resizeNc() { nc.width = cardEl.offsetWidth; nc.height = cardEl.offsetHeight; }
resizeNc();

const NODES = [
  { x:.12, y:.18, vx:.00040, vy:.00025, col:[170,60,255],  sz:.95 },
  { x:.80, y:.12, vx:-.00030,vy:.00033, col:[255,75,175],  sz:.90 },
  { x:.52, y:.52, vx:.00022, vy:-.00028,col:[30,215,255],  sz:.85 },
  { x:.18, y:.80, vx:.00035, vy:-.00020,col:[210,45,255],  sz:.80 },
  { x:.82, y:.72, vx:-.00027,vy:.00022, col:[255,115,70],  sz:.75 },
  { x:.42, y:.90, vx:.00018, vy:.00030, col:[70,90,255],   sz:.72 },
  { x:.65, y:.35, vx:-.00022,vy:-.00025,col:[255,200,80],  sz:.65 },
];
const SPARKS = Array.from({ length: 60 }, () => ({
  x: Math.random(), y: Math.random(),
  phase: Math.random() * Math.PI * 2,
  spd:   Math.random() * .35 + .1,
  r:     Math.random() * .8 + .3,
}));

function drawNebula(ts) {
  const W = nc.width, H = nc.height, t = ts * .001;
  nX.clearRect(0, 0, W, H);
  NODES.forEach(n => {
    n.x += n.vx + Math.sin(t * .65 + n.col[0] * .007) * .00035;
    n.y += n.vy + Math.cos(t * .55 + n.col[1] * .007) * .00035;
    if (n.x < 0 || n.x > 1) n.vx *= -1;
    if (n.y < 0 || n.y > 1) n.vy *= -1;
    const cx = n.x * W, cy = n.y * H;
    const rad = Math.min(W, H) * n.sz * .82;
    const a   = .14 + .06 * Math.sin(t * 1.1 + n.col[0] * .005);
    const g = nX.createRadialGradient(cx, cy, 0, cx, cy, rad);
    g.addColorStop(0,   `rgba(${n.col[0]},${n.col[1]},${n.col[2]},${a})`);
    g.addColorStop(.45, `rgba(${n.col[0]},${n.col[1]},${n.col[2]},${a * .35})`);
    g.addColorStop(1,   'transparent');
    nX.fillStyle = g; nX.fillRect(0, 0, W, H);
  });
  [.22, .52, .80].forEach((yp, i) => {
    const cy = (yp + Math.sin(t * .38 + i * 2.2) * .04) * H;
    const colors = ['rgba(157,78,221,.06)', 'rgba(255,110,180,.05)', 'rgba(0,210,255,.045)'];
    const gb = nX.createLinearGradient(0, cy - 70, 0, cy + 70);
    gb.addColorStop(0, 'transparent'); gb.addColorStop(.5, colors[i]); gb.addColorStop(1, 'transparent');
    nX.fillStyle = gb; nX.fillRect(0, cy - 70, W, 140);
  });
  SPARKS.forEach(s => {
    const a = (.38 + .32 * Math.sin(t * s.spd + s.phase)) * .55;
    nX.beginPath(); nX.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    nX.fillStyle = `rgba(225,195,255,${a})`; nX.fill();
  });
  requestAnimationFrame(drawNebula);
}
requestAnimationFrame(drawNebula);
